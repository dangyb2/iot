spring:
  application:
    name: smart-apt-monitor

  messages:
    encoding: UTF-8

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://db.fgoznfptwhbcliiuobvu.supabase.co:5432/postgres}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driverClassName: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

mqtt:
  broker:
    url: ${MQTT_BROKER_URL:ssl://c84e73f4fb39481295fc29855bdd5613.s1.eu.hivemq.cloud:8883}
  username: ${MQTT_USERNAME:esp32}
  password: ${MQTT_PASSWORD:}
  client:
    id: spring-boot-${random.value}

server:
  port: ${PORT:8080}