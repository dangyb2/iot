spring:
  application:
    name: smart-apt-monitor

  messages:
    encoding: UTF-8

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://db.fgoznfptwhbcliiuobvu.supabase.co:5432/postgres}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driverClassName: org.postgresql.Driver
    hikari:
      maximum-pool-size: 2
      minimum-idle: 0
      idle-timeout: 30000
      connection-timeout: 30000
      max-lifetime: 600000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
mqtt:
  broker:
    url: ${MQTT_BROKER_URL:ssl://c84e73f4fb39481295fc29855bdd5613.s1.eu.hivemq.cloud:8883}
  username: ${MQTT_USERNAME:dangyb}
  password: ${MQTT_PASSWORD:}
  client:
    id: spring-boot-${random.value}

server:
  port: ${PORT:8080}